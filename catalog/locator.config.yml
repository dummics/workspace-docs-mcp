version: 1

workspace:
  id: workspace
  owner: workspace

paths:
  source_roots:
    - .
  source_file_extensions:
    - .asmdef
    - .cs
    - .cshtml
    - .css
    - .editorconfig
    - .env
    - .example
    - .fs
    - .fsx
    - .gitignore
    - .html
    - .js
    - .json
    - .jsonl
    - .jsx
    - .md
    - .mjs
    - .props
    - .ps1
    - .py
    - .sh
    - .sql
    - .toml
    - .ts
    - .tsx
    - .txt
    - .xml
    - .yaml
    - .yml
  source_max_file_bytes: 524288
  source_line_index_max_bytes: 262144
  docs_roots:
    - docs
    - documentation
    - runbooks
    - adr
    - adrs
    - catalog
    - .workspace-docs
  code_roots:
    - src
    - app
    - server
    - client
    - tests
  manifest_files:
    - project.json
    - package.json
    - pyproject.toml
    - README.md
  navigation_files:
    - docs/navigation.json
  generated_index_files:
    - catalog/generated/docs-index.jsonl
  route_files:
    - catalog/generated/agent-routes.json
  alias_files:
    - .workspace-docs/topic-aliases.json
  entity_sources:
    - domain-definitions.json
    - glossary.yml
    - glossary.yaml
    - docs/**/terms.md
    - docs/**/standard-definitions.md
  exclude:
    - .git
    - node_modules
    - bin
    - obj
    - .rag
    - Library
    - Temp
    - dist
    - build
    - .next
    - .turbo
    - .cache
    - coverage
    - .work

index:
  sqlite_path: .rag/catalog.sqlite
  qdrant_url: http://localhost:6333
  qdrant_collection_docs: workspace_document_cards
  qdrant_collection_chunks: workspace_section_chunks
  chunker_version: md-heading-v1
  max_chunk_tokens: 900
  min_chunk_tokens: 80

models:
  embedding_backend: flagembedding_bgem3
  embedding_model: BAAI/bge-m3
  reranker_backend: flagembedding_reranker
  reranker_model: BAAI/bge-reranker-v2-m3
  allow_model_fallback: false
  require_exact_model_names: true
  require_embedding_dimension: 1024
  require_reranker: true
  use_fp16: auto
  query_max_length: 512
  passage_max_length: 2048
  max_model_length: 8192
  local_only: true
  device: auto

retrieval:
  default_max_results: 8
  candidate_limit_dense: 40
  candidate_limit_lexical: 40
  rerank_candidates: 50
  final_top_k: 8
  include_historical_default: false

policy:
  authority:
    canonical: 1.0
    runbook: 0.9
    active: 0.8
    generated: 0.65
    support: 0.55
    historical: 0.3
    deprecated: 0.0
    archived: 0.0
    inferred: 0.45
  exclude_by_default:
    - deprecated
    - archived
  historical_requires_flag: true

confidence:
  high_min_score: 0.80
  medium_min_score: 0.55
  require_valid_citation_for_high: true

auto_index:
  enabled: true
  debounce_seconds: 600
  retry_after_seconds: 15
  max_changed_files: 20
  lock_path: .rag/index.lock
  last_start_path: .rag/index-worker-last-start.json
  log_path: .rag/logs/index-worker.log
